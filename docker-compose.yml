version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-bewell}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bewell_pass}
      POSTGRES_DB: ${DB_NAME:-bewell_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bewell-network

  redis:
    image: redis:7-alpine
    networks:
      - bewell-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bewell}:${DB_PASSWORD:-bewell_pass}@postgres:5432/${DB_NAME:-bewell_db}
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - bewell-network
    deploy:
      replicas: 2

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bewell}:${DB_PASSWORD:-bewell_pass}@postgres:5432/${DB_NAME:-bewell_db}
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - bewell-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - bewell-network

networks:
  bewell-network:
    driver: bridge

volumes:
  pgdata:
